format_version: '11'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

workflows:
  primary:
    steps:
    - activate-ssh-key:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone: {}
    - script:
        title: Setup Node.js
        inputs:
        - content: |-
            #!/bin/env bash
            set -ex
            nvm install 18
            nvm use 18
    - npm:
        title: Install dependencies
        inputs:
        - command: install
    - script:
        title: Install Expo CLI
        inputs:
        - content: |-
            #!/bin/env bash
            set -ex
            npm install -g @expo/cli eas-cli
    - script:
        title: Build iOS App Locally
        inputs:
        - content: |-
            #!/bin/env bash
            set -ex
            echo "Starting local iOS build..."
            
            # Create build directory
            mkdir -p $BITRISE_DEPLOY_DIR
            
            # Use expo export to create a local build
            npx expo export --platform ios --output-dir=./build-output
            
            echo "Build completed. Checking output..."
            ls -la ./build-output/
            
            # Copy everything from build output to deploy directory
            cp -r ./build-output/* $BITRISE_DEPLOY_DIR/ 2>/dev/null || true
            
            # Try alternative approach - create a simple app bundle
            if [ ! -d "./build-output" ] || [ ! "$(ls -A ./build-output)" ]; then
              echo "Trying alternative build approach..."
              npx expo export --platform web --output-dir=./web-build
              cp -r ./web-build/* $BITRISE_DEPLOY_DIR/ 2>/dev/null || true
            fi
            
            # Create build info
            echo "Build completed at $(date)" > $BITRISE_DEPLOY_DIR/build-info.txt
            echo "Build method: Local Expo export" >> $BITRISE_DEPLOY_DIR/build-info.txt
            echo "Build directory contents:" >> $BITRISE_DEPLOY_DIR/build-info.txt
            ls -la $BITRISE_DEPLOY_DIR/ >> $BITRISE_DEPLOY_DIR/build-info.txt
            
            echo "Final deploy directory contents:"
            ls -la $BITRISE_DEPLOY_DIR/
    - deploy-to-bitrise-io:
        inputs:
        - deploy_path: "$BITRISE_DEPLOY_DIR"
        - is_enable_public_page: 'true'
