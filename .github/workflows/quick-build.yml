name: Build iOS

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: npm install -g expo-cli
      - run: npx expo prebuild --platform ios --clean
      - run: cd ios && pod install
      - name: Build IPA
        run: |
          xcodebuild -workspace EndoCompanion.xcworkspace -scheme EndoCompanion -configuration Debug -destination 'generic/platform=iOS Simulator' -allowProvisioningUpdates build
      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: ios/build/**/*.ipa
