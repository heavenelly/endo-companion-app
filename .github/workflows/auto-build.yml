name: Build iOS

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: npm install
      - run: npx expo export --platform ios --output-dir ./dist
      - uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: dist/
