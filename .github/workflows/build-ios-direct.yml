name: Build iOS App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        
    - name: Setup Expo CLI
      run: npm install -g @expo/cli eas-cli
      
    - name: Install dependencies
      run: npm install --force
      
    - name: Login to Expo
      run: eas login --non-interactive
      env:
        EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        
    - name: Build iOS App
      run: |
        # Set working directory
        cd endo-companion-app
        
        # Try different build approaches
        echo "Attempting EAS build..."
        eas build --platform ios --profile simulator --non-interactive --skip-project-configuration || echo "EAS build failed"
        
        # If EAS fails, try expo export
        if [ $? -ne 0 ]; then
          echo "Trying expo export..."
          npx expo export --platform ios --output-dir ./dist || echo "Expo export failed"
        fi
        
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ios-build
        path: |
          endo-companion-app/build/*.ipa
          endo-companion-app/dist/*.tar.gz
        retention-days: 30
