workflows:
  build-ios:
    name: Build iOS IPA
    environment:
      groups:
        - expo_credentials
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Install EAS CLI
        script: |
          npm install -g eas-cli@latest
      - name: Build iOS IPA
        script: |
          eas build --platform ios --profile development --non-interactive
    artifacts:
      - build/*.ipa
