workflows:
  build-ios:
    name: Build iOS IPA
    environment:
      vars:
        EXPO_TOKEN: $EXPO_TOKEN
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Install EAS CLI
        script: |
          npm install -g eas-cli@latest
      - name: Build iOS IPA
        script: |
          eas build --platform ios --profile preview --non-interactive
    artifacts:
      - build/*.ipa
